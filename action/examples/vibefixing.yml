# Copy this file to .github/workflows/vibefixing.yml in your project

name: VibeFixing
on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  code-health:
    name: Code Health Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: open-neo/vibefixing-action@v1
        with:
          scan: 'true'
          review: 'false'
          severity: 'medium'
          fail-on-findings: 'true'
          comment: 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
