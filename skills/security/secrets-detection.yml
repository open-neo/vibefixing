skillId: sec-secrets-detection
category: security
name: Secrets Detection
version: "1.0.0"
match:
  files:
    - "*.ts"
    - "*.tsx"
    - "*.js"
    - "*.jsx"
    - "*.py"
    - "*.java"
    - "*.go"
    - "*.env"
    - "*.yml"
    - "*.yaml"
    - "*.json"
rules:
  - "Never commit secrets to source control"
  - "Use environment variables for sensitive configuration"
  - "Rotate secrets regularly"
  - "Use secret management services"
antiPatterns:
  - "Hardcoded API keys in source code"
  - "Hardcoded passwords in source code"
  - "Hardcoded tokens in source code"
  - "AWS access keys in source code"
  - "Private keys in source code"
severity:
  "Hardcoded API keys in source code": critical
  "Hardcoded passwords in source code": critical
  "Hardcoded tokens in source code": critical
  "AWS access keys in source code": critical
  "Private keys in source code": critical
